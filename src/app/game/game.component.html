<section *ngIf="!hasStarted" class="start-screen">
  <div class="start-screen__panel">
    <div class="start-screen__eyebrow">{{ copy.messages.ui.startScreen.eyebrow }}</div>
    <h1>{{ copy.messages.ui.startScreen.title }}</h1>
    <p>{{ copy.messages.ui.startScreen.description }}</p>

    <div *ngIf="hasSavedGame" class="start-screen__pill">
      {{ copy.messages.ui.startScreen.saveDetected }}
    </div>

    <div class="start-screen__actions">
      <button class="start-screen__primary" (click)="startGame()">
        {{ copy.messages.ui.startScreen.start }}
      </button>

      <button *ngIf="hasSavedGame" class="start-screen__secondary" (click)="startFresh()">
        {{ copy.messages.ui.startScreen.newRun }}
      </button>

      <label class="start-screen__secondary start-screen__import">
        {{ copy.messages.ui.startScreen.importFile }}
        <input type="file" accept=".json,.txt" (change)="importSaveFile($event)" />
      </label>
    </div>

    <p
      *ngIf="startScreenMessage"
      class="start-screen__message"
      [class.success]="startScreenTone === 'success'"
      [class.error]="startScreenTone === 'error'"
    >
      {{ startScreenMessage }}
    </p>
  </div>
</section>

<ng-container *ngIf="hasStarted">
  <app-stats-header (settingsRequested)="openSettingsDialog()"></app-stats-header>

  <div class="main">
    <app-planet-view></app-planet-view>
    <app-upgrade-panel></app-upgrade-panel>
  </div>

  <app-reset-dialog
    *ngIf="showResetDialog"
    (confirmed)="onResetConfirmed()"
    (cancelled)="showResetDialog = false"
  ></app-reset-dialog>

  <app-settings-dialog
    *ngIf="showSettingsDialog"
    #settingsDialog
    [exportCode]="exportSaveValue"
    [exportFileContents]="exportSaveFileContents"
    [currentLocale]="copy.currentLocale"
    [localeOptions]="copy.localeOptions"
    (closed)="showSettingsDialog = false"
    (importRequested)="handleImport(settingsDialog, $event)"
    (localeChanged)="changeLanguage(settingsDialog, $event)"
    (resetRequested)="requestResetFromSettings()"
  ></app-settings-dialog>
</ng-container>
