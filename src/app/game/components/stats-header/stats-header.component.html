<header class="border-b border-[var(--border-color)] bg-[linear-gradient(135deg,rgba(15,23,42,0.98),rgba(12,18,32,0.94)),var(--panel-noise)] shadow-[0_12px_40px_rgba(2,6,23,0.24)]">
  <div
    class="grid gap-4 px-4 py-[1.1rem] min-[960px]:grid-cols-[minmax(0,1fr)_auto] min-[960px]:items-center min-[1600px]:gap-6 min-[1600px]:px-6 min-[1600px]:py-5 min-[1920px]:px-8 max-[720px]:p-4"
  >
    <div class="min-w-0">
      <div class="text-[0.7rem] uppercase tracking-[0.18em] text-slate-400">
        {{ copy.messages.ui.statsHeader.eyebrow }}
      </div>
      <div class="mb-1 mt-0.5 flex flex-wrap items-center gap-3">
        <h1 class="m-0 text-[1.9rem] leading-none tracking-[-0.04em] text-slate-50 min-[1600px]:text-[2.25rem] min-[1920px]:text-[2.55rem]">
          {{ copy.messages.ui.statsHeader.title }}
        </h1>
        <span
          class="rounded-full border bg-white/[0.03] px-3 py-1 text-[0.76rem] font-semibold text-slate-300 min-[1600px]:px-3.5 min-[1600px]:py-1.5 min-[1600px]:text-[0.82rem]"
          [style.borderColor]="currentPlanet.color"
        >
          {{ currentPlanet.name }}
        </span>
      </div>
      <p class="m-0 max-w-[42rem] text-[0.88rem] leading-[1.45] text-slate-400 min-[1600px]:max-w-[54rem] min-[1600px]:text-[0.95rem]">
        {{ currentPlanet.description }}
      </p>
    </div>

    <div class="grid gap-3 text-left min-[960px]:justify-items-end min-[960px]:text-right">
      <div class="grid gap-1">
        <div class="text-[0.88rem] font-bold text-slate-50 min-[1600px]:text-[0.96rem]">{{ miningLabel }}</div>
        <div class="flex flex-wrap gap-3 text-[0.78rem] text-slate-400 min-[960px]:justify-end min-[1600px]:text-[0.84rem]">
          <span>{{ clickRateLabel }}</span>
          <span>{{ autoRateLabel }}</span>
        </div>
        <div class="flex flex-wrap gap-3 text-[0.78rem] text-slate-400 min-[960px]:justify-end min-[1600px]:text-[0.84rem]">
          <span>{{ shipStatus }}</span>
          <span>{{ totalClicksLabel }}</span>
        </div>
      </div>

      <div class="flex flex-wrap gap-2 min-[960px]:justify-end">
        @if (menuAvailable()) {
          <button
            class="inline-flex items-center justify-center gap-2 rounded-[0.8rem] border border-white/10 bg-white/[0.04] px-3.5 py-2.5 text-[0.74rem] font-bold text-slate-100 transition hover:-translate-y-px hover:bg-white/[0.08] min-[960px]:hidden"
            type="button"
            [attr.aria-expanded]="mobileMenuOpen()"
            (click)="mobileMenuToggleRequested.emit()"
          >
            <span aria-hidden="true" class="flex h-3.5 w-3.5 flex-col justify-between">
              <span class="block h-px w-full rounded-full bg-current"></span>
              <span class="block h-px w-full rounded-full bg-current"></span>
              <span class="block h-px w-full rounded-full bg-current"></span>
            </span>
            <span>{{ mobileMenuLabel }}</span>
          </button>
        }

        <button
          class="inline-flex items-center justify-center gap-2 rounded-[0.8rem] border px-4 py-2.5 text-[0.76rem] font-bold transition min-[1600px]:gap-2.5 min-[1600px]:rounded-[0.95rem] min-[1600px]:px-5 min-[1600px]:py-3 min-[1600px]:text-[0.84rem]"
          [ngClass]="overviewViewActive()
            ? 'border-violet-400/35 bg-violet-500/14 text-violet-50 shadow-[inset_0_0_0_1px_rgba(237,233,254,0.08)] hover:-translate-y-px hover:bg-violet-500/20'
            : 'border-indigo-400/30 bg-indigo-900/22 text-indigo-100 shadow-[inset_0_0_0_1px_rgba(224,231,255,0.08)] hover:-translate-y-px hover:bg-indigo-800/28'"
          type="button"
          (click)="overviewWorkspaceToggleRequested.emit()"
        >
          <span aria-hidden="true" class="text-[0.95rem] leading-none min-[1600px]:text-[1.05rem]">◎</span>
          <span>{{ overviewButtonLabel }}</span>
        </button>

        <button
          class="inline-flex items-center justify-center gap-2 rounded-[0.8rem] border px-4 py-2.5 text-[0.76rem] font-bold transition min-[1600px]:gap-2.5 min-[1600px]:rounded-[0.95rem] min-[1600px]:px-5 min-[1600px]:py-3 min-[1600px]:text-[0.84rem]"
          [ngClass]="operationsViewActive()
            ? 'border-amber-400/35 bg-amber-500/14 text-amber-50 shadow-[inset_0_0_0_1px_rgba(254,243,199,0.08)] hover:-translate-y-px hover:bg-amber-500/20'
            : 'border-sky-400/30 bg-sky-900/22 text-sky-100 shadow-[inset_0_0_0_1px_rgba(224,242,254,0.08)] hover:-translate-y-px hover:bg-sky-800/28'"
          type="button"
          (click)="operationsWorkspaceToggleRequested.emit()"
        >
          <span aria-hidden="true" class="text-[0.95rem] leading-none min-[1600px]:text-[1.05rem]">⇆</span>
          <span>{{ operationsButtonLabel }}</span>
        </button>

        @if (shipsUnlocked()) {
          <button
            data-tutorial-id="ships-toggle"
            class="inline-flex items-center justify-center gap-2 rounded-[0.8rem] border px-4 py-2.5 text-[0.76rem] font-bold transition min-[1600px]:gap-2.5 min-[1600px]:rounded-[0.95rem] min-[1600px]:px-5 min-[1600px]:py-3 min-[1600px]:text-[0.84rem]"
            [ngClass]="shipsViewActive()
              ? 'border-emerald-400/35 bg-emerald-500/15 text-emerald-100 shadow-[inset_0_0_0_1px_rgba(209,250,229,0.08)] hover:-translate-y-px hover:bg-emerald-500/22'
              : 'border-cyan-400/35 bg-cyan-900/25 text-cyan-100 shadow-[inset_0_0_0_1px_rgba(207,250,254,0.08)] hover:-translate-y-px hover:bg-cyan-800/28'"
            type="button"
            (click)="shipsWorkspaceToggleRequested.emit()"
          >
            <span aria-hidden="true" class="text-[0.95rem] leading-none min-[1600px]:text-[1.05rem]">🛰</span>
            <span>{{ shipsButtonLabel }}</span>
          </button>
        }

        <button
          class="inline-flex items-center justify-center gap-2 rounded-[0.8rem] border border-blue-400/35 bg-blue-800/30 px-4 py-2.5 text-[0.76rem] font-bold text-blue-100 shadow-[inset_0_0_0_1px_rgba(191,219,254,0.08)] transition hover:-translate-y-px hover:bg-blue-700/35 min-[1600px]:gap-2.5 min-[1600px]:rounded-[0.95rem] min-[1600px]:px-5 min-[1600px]:py-3 min-[1600px]:text-[0.84rem]"
          type="button"
          (click)="settingsRequested.emit()"
        >
          <span aria-hidden="true" class="text-[0.95rem] leading-none min-[1600px]:text-[1.05rem]">⚙</span>
          <span>{{ copy.messages.ui.statsHeader.settings }}</span>
        </button>
      </div>
    </div>
  </div>
</header>
