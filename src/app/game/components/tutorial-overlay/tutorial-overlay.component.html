@if (step) {
  <div class="fixed inset-0 z-[100] pointer-events-none">
    @if (targetRect) {
      <!-- Dim regions (four quads around the highlighted element) -->
      <div class="absolute left-0 top-0 bg-slate-950/70" [style.width.px]="targetRect.left" [style.height.%]="100"></div>
      <div class="absolute top-0 bg-slate-950/70" [style.left.px]="targetRect.left" [style.width.px]="targetRect.width" [style.height.px]="targetRect.top"></div>
      <div class="absolute top-0 right-0 bg-slate-950/70" [style.width.px]="viewportWidth - targetRect.right" [style.height.%]="100"></div>
      <div class="absolute bg-slate-950/70" [style.left.px]="targetRect.left" [style.top.px]="targetRect.bottom" [style.width.px]="targetRect.width" [style.height.px]="viewportHeight - targetRect.bottom"></div>

      <!-- Highlight outline -->
      <div
        class="absolute rounded-xl border border-cyan-300/60 shadow-[0_0_0_4px_rgba(34,211,238,0.12)]"
        [style.left.px]="targetRect.left"
        [style.top.px]="targetRect.top"
        [style.width.px]="targetRect.width"
        [style.height.px]="targetRect.height"
      ></div>
    } @else {
      <!-- Anchor off-screen — full dim -->
      <div class="absolute inset-0 bg-slate-950/70"></div>
    }

    <!-- Tooltip -->
    <div
      class="absolute pointer-events-auto rounded-2xl border border-white/10 bg-[rgba(8,15,26,0.92)] text-slate-200 shadow-[0_20px_60px_rgba(2,6,23,0.55)] backdrop-blur"
      [ngStyle]="tooltipStyle"
    >
      <div
        class="cursor-move touch-none select-none"
        (pointerdown)="onDragStart($event)"
      >
        <div class="text-[0.72rem] uppercase tracking-[0.16em] text-cyan-200/70">Tutorial ⠿</div>
        <div class="mt-1 text-[0.95rem] font-bold text-slate-50">{{ step.title }}</div>
      </div>
      <div class="mt-2 text-[0.82rem] leading-6 text-slate-300">{{ step.body }}</div>

      <div class="mt-3 flex items-center justify-end gap-2">
        <button
          class="rounded-[0.75rem] border border-white/10 bg-white/[0.05] px-3 py-2 text-[0.78rem] font-bold text-slate-100 transition hover:bg-white/[0.1]"
          type="button"
          (click)="skip()"
        >Skip</button>

        @if (step.requiresAck) {
          <button
            class="rounded-[0.75rem] border border-cyan-400/25 bg-cyan-500/14 px-3 py-2 text-[0.78rem] font-bold text-cyan-100 transition hover:bg-cyan-500/20"
            type="button"
            (click)="next()"
          >Next</button>
        }
      </div>
    </div>
  </div>
}
