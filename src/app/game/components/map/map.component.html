@if (isOpen()) {
  <div
    class="fixed inset-0 z-40 flex items-center justify-center bg-black/85 backdrop-blur-sm"
    (click)="closeMap.emit()"
  >
    <div
      class="relative flex flex-col rounded-2xl border border-cyan-500/25 bg-[#010b16] shadow-[0_0_100px_rgba(6,182,212,0.12)] overflow-hidden"
      style="width: min(96vw, 940px); height: min(88vh, 660px);"
      (click)="$event.stopPropagation()"
    >
      <!-- Header -->
      <div class="flex items-center justify-between px-5 py-3.5 border-b border-white/[0.07] shrink-0">
        <div>
          <h2 class="text-[1.05rem] font-bold text-cyan-200 tracking-wide">Galactic Map</h2>
          <p class="text-[0.65rem] text-slate-500 mt-0.5">drag to rotate · scroll to zoom</p>
        </div>
        <button
          class="text-slate-500 hover:text-slate-200 transition p-1.5 rounded-lg hover:bg-white/5"
          (click)="closeMap.emit()"
        >✕</button>
      </div>

      <!-- 3D Canvas -->
      <canvas
        #mapCanvas
        class="flex-1 w-full block"
        [style.cursor]="isDragging ? 'grabbing' : 'grab'"
        style="touch-action: none;"
        (pointerdown)="onPointerDown($event)"
        (pointermove)="onPointerMove($event)"
        (pointerup)="onPointerUp()"
        (pointerleave)="onPointerUp()"
        (wheel)="onWheel($event)"
      ></canvas>

      <!-- Legend -->
      <div class="flex flex-wrap items-center gap-x-5 gap-y-1.5 px-5 py-3 border-t border-white/[0.07] text-[0.7rem] shrink-0">
        <div class="flex items-center gap-1.5">
          <div class="w-2.5 h-2.5 rounded-full bg-cyan-400 shadow-[0_0_5px_#22d3ee]"></div>
          <span class="text-slate-400">Planets</span>
        </div>
        <div class="flex items-center gap-1.5">
          <div class="w-2.5 h-2.5 rounded-full bg-violet-500 shadow-[0_0_5px_#8b5cf6]"></div>
          <span class="text-slate-400">Enemy Systems</span>
        </div>
        <div class="flex items-center gap-1.5">
          <div class="w-2.5 h-2.5 rounded-full bg-pink-500 shadow-[0_0_5px_#ec4899]"></div>
          <span class="text-slate-400">Attacking Fleet</span>
        </div>
        <div class="flex items-center gap-1.5">
          <div class="w-2.5 h-2.5 rounded-full bg-cyan-400 shadow-[0_0_5px_#22d3ee]"></div>
          <span class="text-slate-400">Unit Transit</span>
        </div>
        <div class="flex items-center gap-1.5">
          <div class="w-2.5 h-2.5 rounded-full bg-orange-400 shadow-[0_0_5px_#f97316]"></div>
          <span class="text-slate-400">Invasion Fleet</span>
        </div>
        <div class="flex items-center gap-1.5">
          <div class="w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_5px_#22c55e]"></div>
          <span class="text-slate-400">Garrison (strength)</span>
        </div>
      </div>
    </div>
  </div>
}
