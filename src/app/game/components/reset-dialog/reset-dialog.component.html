<div class="fixed inset-0 z-[100] flex items-center justify-center bg-black/70 p-4" (click)="cancelled.emit()">
  <div
    class="w-full max-w-md rounded-2xl border border-slate-700 bg-slate-800 px-8 py-6 text-center shadow-[0_24px_80px_rgba(2,6,23,0.45)]"
    (click)="$event.stopPropagation()"
  >
    <p class="mb-4 text-[1.1rem] text-slate-200">{{ copy.messages.ui.resetDialog.question }}</p>
    <div class="flex justify-center gap-3">
      <button
        class="rounded-xl border border-rose-500 bg-rose-500/20 px-5 py-2 text-[0.85rem] font-semibold text-rose-200 transition hover:bg-rose-500/35"
        (click)="confirmed.emit()"
      >
        {{ copy.messages.ui.resetDialog.confirm }}
      </button>
      <button
        class="rounded-xl border border-slate-600 bg-slate-700 px-5 py-2 text-[0.85rem] font-semibold text-slate-200 transition hover:bg-slate-600"
        (click)="cancelled.emit()"
      >
        {{ copy.messages.ui.resetDialog.cancel }}
      </button>
    </div>
  </div>
</div>
